# --- Font ---
font_family      IBM Plex Mono
bold_font        IBM Plex Mono Bold
italic_font      IBM Plex Mono Italic
font_size        10.0

# --- Cursor ---
cursor_shape     underline
cursor           #f0f0f0
cursor_text_color #0f0f0f

# --- Scrollback ---
scrollback_lines 1000

# --- Primary colors ---
foreground       #f0f0f0
background       #0f0f0f
selection_foreground #f0f0f0
selection_background #303340

# --- Normal colors ---
color0  #262626
color1  #ac8a8c
color2  #8aac8b
color3  #aca98a
color4  #8f8aac
color5  #ac8aac
color6  #8aabac
color7  #e7e7e7

# --- Bright colors ---
color8  #4c4c4c
color9  #c49ea0
color10 #9ec49f
color11 #c4c19e
color12 #a39ec4
color13 #c49ec4
color14 #9ec3c4
color15 #f5f5f5

# --- Search (Kitty uses mark colors) ---
mark1_foreground #1b1e28
mark1_background #add7ff

# --- URL underline color (optional to match cursor style feel) ---
url_color #8f8aac

# --- TERM (optional; kitty default is xterm-kitty) ---
term xterm-kitty
